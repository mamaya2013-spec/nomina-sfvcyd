name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ntglefztorxxdixpmnaj.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_U7Rhm1kbdSWIvAOMeZeJeA_UDSuVsyl


      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
